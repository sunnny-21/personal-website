<body>

  <main class="hero">

    <!-- Background image in its own div so we can animate it independently -->
    <div class="hero-bg"></div>

    <!--
      Ray navigation — SVG overlay that covers the full viewport.

      Coordinate system: viewBox is centered at (0,0), which maps to
      the middle of the screen (and the middle of the sun image).
      Each ray is an <a> tag containing:
        - a <line> from near the orb outward along a ray
        - a <text> label at the far end

      Angles (degrees from 12 o'clock, clockwise):
        About   ~  20°  upper-right
        Work    ~  75°  right
        Gallery ~ 135°  lower-right
        Quotes  ~ 200°  lower-left
        Music   ~ 295°  upper-left

      These are deliberately uneven — not a pie chart.
    -->
    <svg class="ray-nav"
         viewBox="-525 -303 1000 666"
         preserveAspectRatio="xMidYMid slice"
         role="navigation"
         aria-label="Site navigation">

      <!-- About — upper right -->
      <a href="about.html" class="ray-link">
        <line x1="9"   y1="-48"  x2="19"  y2="-108"/>
        <text x="21"  y="-116" font-size="11" letter-spacing="2">ABOUT</text>
      </a>

      <!-- Work — right -->
      <a href="work.html" class="ray-link">
        <line x1="45"  y1="-21"  x2="98"  y2="-47"/>
        <text x="102" y="-43"  font-size="11" letter-spacing="2">WORK</text>
      </a>

      <!-- Gallery — lower right -->
      <a href="gallery.html" class="ray-link">
        <line x1="41"  y1="28"   x2="89"  y2="62"/>
        <text x="93"  y="72"   font-size="11" letter-spacing="2">GALLERY</text>
      </a>

      <!-- Quotes — lower left -->
      <a href="quotes.html" class="ray-link">
        <line x1="-9"  y1="48"   x2="-19" y2="108"/>
        <text x="-21" y="118"  font-size="11" letter-spacing="2" text-anchor="end">QUOTES</text>
      </a>

      <!-- Music — upper left -->
      <a href="music.html" class="ray-link">
        <line x1="-47" y1="-13"  x2="-105" y2="-28"/>
        <text x="-108" y="-25" font-size="11" letter-spacing="2" text-anchor="end">MUSIC</text>
      </a>

    </svg>

    <!-- Name — painted image, top left, links back to home -->
    <div class="name-core">
      <a href="index.html">
        <img src="name_transparent.png" alt="Surya Thalli" class="name-img">
      </a>
    </div>

  </main>

  <!--
    Mobile nav — hidden on desktop, shown on small/touch screens.
    The radial SVG concept is desktop-only; this replaces it simply.
  -->
  <nav class="mobile-nav" aria-label="Site navigation">
    <a href="about.html">About</a>
    <a href="work.html">Work</a>
    <a href="gallery.html">Gallery</a>
